{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 650px; margin: 40px auto;">

    <div class="card" style="
        background: white;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        text-align: center;
    ">
        <h2 style="margin-bottom: 10px;">No Upcoming Classes</h2>
        <p style="font-size: 1.1rem; color: #555;">
            You don’t have any upcoming classes scheduled right now.
        </p>

        <div style="margin-top: 25px;">
            <a href="{% url 'schedule' %}" 
               style="
                    display: inline-block;
                    padding: 12px 20px;
                    background: #0057b8;
                    color: white;
                    border-radius: 8px;
                    text-decoration: none;
                    font-weight: 600;
               ">
                Go to Schedule
            </a>
        </div>

        <div style="margin-top: 15px;">
            <a href="{% url 'index' %}" 
               style="
                    display: inline-block;
                    padding: 10px 18px;
                    background: #e0e0e0;
                    color: #333;
                    border-radius: 8px;
                    text-decoration: none;
                    font-weight: 500;
               ">
                Return Home
            </a>
        </div>
    </div>

</div>
{% endblock %}
