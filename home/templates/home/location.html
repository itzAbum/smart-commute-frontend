{% extends "home/base.html" %}

{% block content %}

<h2 class="title">Starting Location Setup</h2>

<div class="location-container">

    <!-- Django Form -->
    <form method="POST" class="form-box">
        {% csrf_token %}

        <label for="id_address">Enter Your Starting Location</label>
        {{ form.address }}

        <button onclick="getLiveLocation()" class="save-btn">
            Use My Current Location
        </button>

        <p id="savedLocation" class="saved-text">No location saved yet.</p>
    </form>

    <!-- Display Saved Location -->
    {% if saved_location %}
        <h3 class="subtitle">Saved Location</h3>
        <p class="saved-text">{{ saved_location }}</p>
    {% endif %}

</div>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    .title {
        text-align: center;
        margin-top: 30px;
        color: #1e4d8a;
    }

    .location-container {
        width: 80%;
        margin: 20px auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 25px;
    }

    label {
        font-weight: bold;
    }

    input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 100%;
    }

    .save-btn {
        margin-top: 10px;
        padding: 12px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    .save-btn:hover {
        background: #357ab8;
    }

    .subtitle {
        margin-top: 10px;
        color: #1e4d8a;
    }

    .saved-text {
        background: #e8eef7;
        padding: 12px;
        border-radius: 6px;
    }

    
</style>

<script>


// CSRF Token Helper
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie("csrftoken");


// Get Live Location
function getLiveLocation() {
    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition(success, error);
}

function success(position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    // Show on page
    document.getElementById("savedLocation").innerText =
        `Latitude: ${lat}, Longitude: ${lng}`;

    // Save to backend
    saveLocation(lat, lng);
}

function error() {
    alert("Unable to retrieve your location. Please enable location permissions.");
}


// Save Location to Backend
function saveLocation(lat, lng) {
    fetch("/save-location/", {
        method: "POST",
        headers: {
            "X-CSRFToken": csrftoken,
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `latitude=${lat}&longitude=${lng}&address=Live+Location`
    })
    .then(response => response.json())
    .then(data => {
        console.log("Location saved:", data);
    })
    .catch(err => console.error("Save error:", err));
}
</script>


{% endblock %}
