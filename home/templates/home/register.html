{% extends "home/base.html" %}

{% block content %}

<style>
    /* Hide header + navbar ONLY on this page */
    header, .navbar {
        display: none;
    }

    /* Match login page background + layout */
    body {
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        margin-top: 60px;
        font-family: Arial, sans-serif;
    }

    .auth-container {
        background: white;
        padding: 30px;
        width: 320px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: left;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e4d8a;
    }

    label {
        margin-top: 12px;
        font-weight: bold;
        display: block;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .password-wrapper {
        position: relative;
    }

    .eye-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background-color: #4a90e2;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #357ab8;
    }

    .error-text {
        color: red;
        display: none;
        margin-top: 10px;
        font-size: 14px;
    }

    .switch-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .switch-text a {
        color: #4a90e2;
        font-weight: bold;
        text-decoration: none;
    }
</style>

<div class="auth-container">
    <h2>Create Your Account</h2>

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}

        <label for="newLogin">Create username</label>
        <input type="text" id="newLogin" name="username" placeholder="Enter username" required>

        <label for="newPassword">Create Password</label>
        <div class="password-wrapper">
            <input type="password" id="newPassword" name="password" placeholder="Enter new password" required>
            <span onclick="togglePassword('newPassword', 'eye1')" id="eye1" class="eye-icon">👁️</span>
        </div>

        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" name="confirm_password" placeholder="Re-enter password" required>
            <span onclick="togglePassword('confirmPassword', 'eye2')" id="eye2" class="eye-icon">👁️</span>
        </div>

        <p id="passwordError" class="error-text">Passwords do not match.</p>

        <button type="submit" id="submitBtn" disabled>Create Account</button>

        <p class="switch-text">
            Already have an account?
            <a href="{% url 'login' %}">Log in</a>
        </p>
    </form>
</div>

<script>
    const password = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const errorText = document.getElementById('passwordError');
    const submitBtn = document.getElementById('submitBtn');

    function validatePasswords() {
        if (password.value === "" && confirmPassword.value === "") {
            errorText.style.display = 'none';
            submitBtn.disabled = true;
            return;
        }

        if (password.value !== confirmPassword.value) {
            errorText.style.display = 'block';
            submitBtn.disabled = true;
        } else {
            errorText.style.display = 'none';
            submitBtn.disabled = false;
        }
    }

    password.addEventListener('input', validatePasswords);
    confirmPassword.addEventListener('input', validatePasswords);

    function togglePassword(inputId, eyeId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);

        if (input.type === "password") {
            input.type = "text";
            eye.textContent = "🙈";
        } else {
            input.type = "password";
            eye.textContent = "👁️";
        }
    }
</script>

{% endblock %}
