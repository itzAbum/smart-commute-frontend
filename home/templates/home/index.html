{% extends "home/base.html" %}

{% block content %}

<style>
    .container {
        width: 80%;
        margin: 30px auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-top: 40px;
    }

    .nav-options p {
        background: #e8eef7;
        padding: 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
    }

    .nav-options p:hover {
        background: #d4e0f5;
    }

    .register-btn, .schedule-section {
        display: block;
        width: 200px;
        margin: 20px auto;
        padding: 12px;
        background: #4a90e2;
        color: white;
        text-align: center;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
        text-decoration: none;
    }

    .register-btn:hover, .schedule-section:hover {
        background: #357ab8;
        transform: scale(1.03);
    }

    iframe {
        display: block;
        margin: 20px auto;
        border: 0;
        border-radius: 8px;
    }

    footer {
        text-align: center;
        padding: 20px;
        color: #666;
        margin-top: 40px;
    }
</style>

<div class="container">
    <h2>Get Started</h2>

    <div class="nav-options">
        <p><strong>Institution:</strong> Georgia State University</p>
    </div>

    <div class="action-buttons">
        <a href="{% url 'register' %}" class="register-btn">Create Account</a>
        <a href="{% url 'schedule' %}" class="schedule-section">Add schedule</a>
    </div>

    <h2>Map of Georgia State University</h2>

    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6634.587980674266!2d-84.38947233878426!3d33.75306810237689!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88f5038613efe1b9%3A0x4ac19f9be05c6e97!2sGeorgia%20State%20University!5e0!3m2!1sen!2sus!4v1771955693639!5m2!1sen!2sus"
        width="600"
        height="450"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>

<footer>
    <p>Smart Commute © 2026</p>
</footer>

{% endblock %}
