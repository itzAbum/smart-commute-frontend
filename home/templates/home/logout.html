{% extends "home/base.html" %}

{% block content %}

<div style="
    width: 80%;
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
">

    {% if user.is_authenticated %}
        <h2 style="color:#1e4d8a;">Goodbye, {{ user.username }}!</h2>
        <p>You have been logged out. Redirecting you to the homepage...</p>
    {% else %}
        <h2 style="color:#1e4d8a;">You are logged out.</h2>
        <p>Redirecting you to the homepage...</p>
    {% endif %}

    <a href="{% url 'login' %}" style="
        display:block;
        width:200px;
        margin:10px auto;
        padding:12px;
        background:#1e4d8a;
        color:white;
        text-decoration:none;
        border-radius:6px;
    ">Log In Again</a>

    <a href="{% url 'home' %}" style="
        display:block;
        width:200px;
        margin:10px auto;
        padding:12px;
        background:#4a90e2;
        color:white;
        text-decoration:none;
        border-radius:6px;
    ">Return Home</a>
</div>

<script>
    setTimeout(function() {
        window.location.href = "{% url 'home' %}";
    }, 2500);
</script>

{% endblock %}
