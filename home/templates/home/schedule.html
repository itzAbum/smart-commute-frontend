
{% extends "home/base.html" %}
{% load static %}
{% block content %}

<style>
    .page-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 30px;
    }
    .editor-container {
        width: 90%;
        max-width: 900px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .title {
        text-align: center;
        color: #1e4d8a;
        margin-bottom: 20px;
    }
    .form-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 30px;
    }
    label {
        font-weight: bold;
    }
    input, select {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .add-btn {
        margin-top: 10px;
        padding: 12px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }
    .add-btn:hover {
        background: #357ab8;
    }
    .subtitle {
        margin-top: 20px;
        color: #1e4d8a;
    }
    .schedule-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }
    .schedule-table th, .schedule-table td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }
    .schedule-table th {
        background: #e8eef7;
    }
    .action-btn {
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .edit-btn {
        background: #ffc107;
        color: black;
    }
    .delete-btn {
        background: #dc3545;
        color: white;
    }
    .back-btn {
        position: absolute;
        top: 100px;
        left: 20px;
        padding: 8px 14px;
        background-color: #4a90e2;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        color: white;
    }
    .back-btn:hover {
        background-color: #357ab8;
    }
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: white;
        padding: 25px;
        width: 400px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    .close {
        float: right;
        font-size: 24px;
        cursor: pointer;
    }
</style>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="page-container">
    <div class="editor-container">

        <h2 class="title">Schedule Editor</h2>

        <form id="scheduleForm" class="form-box">
            <label for="course">Course Name</label>
            <input type="text" id="course" name="course" placeholder="Enter course name">

            <label for="building">Building</label>
            <select id="building" name="building">
                <option value="">Select building</option>
                {% for b in buildings %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>

            <label>Day(s) of the Week</label>
            <div class="day-checkboxes">
                <label><input type="checkbox" name="days" value="Monday"> Monday</label>
                <label><input type="checkbox" name="days" value="Tuesday"> Tuesday</label>
                <label><input type="checkbox" name="days" value="Wednesday"> Wednesday</label>
                <label><input type="checkbox" name="days" value="Thursday"> Thursday</label>
                <label><input type="checkbox" name="days" value="Friday"> Friday</label>
            </div>

            <label for="start">Start Time</label>
            <input type="time" id="start" name="start">

            <label for="end">End Time</label>
            <input type="time" id="end" name="end">

            <button type="submit" class="add-btn">Add Class</button>
        </form>

        <h3 class="subtitle">Your Schedule</h3>

        <table id="scheduleTable" class="schedule-table">
            <tr>
                <th>Course</th>
                <th>Location</th>
                <th>Day(s)</th>
                <th>Start</th>
                <th>End</th>
                <th>Actions</th>
            </tr>
        </table>

        <h3 class="subtitle">Weekly Schedule</h3>

        <table id="weekTable" class="schedule-table">
            <tr>
                <th>Time</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </table>

    </div>
</div>

<!-- WEEKLY GRID GENERATION -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const displayTimes = [
        "08:00 AM","08:15 AM","08:30 AM","08:45 AM",
        "09:00 AM","09:15 AM","09:30 AM","09:45 AM",
        "10:00 AM","10:15 AM","10:30 AM","10:45 AM",
        "11:00 AM","11:15 AM","11:30 AM","11:45 AM",
        "12:00 PM","12:15 PM","12:30 PM","12:45 PM",
        "01:00 PM","01:15 PM","01:30 PM","01:45 PM",
        "02:00 PM","02:15 PM","02:30 PM","02:45 PM",
        "03:00 PM","03:15 PM","03:30 PM","03:45 PM",
        "04:00 PM","04:15 PM","04:30 PM","04:45 PM",
        "05:00 PM","05:15 PM","05:30 PM","05:45 PM",
        "06:00 PM","06:15 PM","06:30 PM","06:45 PM",
        "07:00 PM","07:15 PM","07:30 PM","07:45 PM",
        "08:00 PM","08:15 PM","08:30 PM","08:45 PM",
        "09:00 PM","09:15 PM","09:30 PM","09:45 PM"
    ];

    function toIdPart(t) {
        let [time, mer] = t.split(" ");
        let [h, m] = time.split(":").map(Number);
        if (mer === "PM" && h !== 12) h += 12;
        if (mer === "AM" && h === 12) h = 0;
        return `${String(h).padStart(2,'0')}-${m.toString().padStart(2,'0')}`;
    }

    const weekTable = document.getElementById("weekTable");

    displayTimes.forEach(t => {
        const idPart = toIdPart(t);
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${t}</td>
            ${["Mon","Tue","Wed","Thu","Fri"].map(day => `
                <td id="${day}-${idPart}"></td>
            `).join("")}
        `;
        weekTable.appendChild(row);
    });

});
</script>

<!-- EDIT MODAL -->
<div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <h2>Edit Class</h2>

        <form id="editForm">
            <label>Course Name</label>
            <input type="text" id="editCourse" name="course">

            <label>Building</label>
            <select id="editBuilding" name="building">
                {% for b in buildings %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
            </select>

            <label>Day</label>
            <select id="editDay" name="day">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>

            <label>Start Time</label>
            <input type="time" id="editStart" name="start">

            <label>End Time</label>
            <input type="time" id="editEnd" name="end">

            <button type="submit" class="add-btn">Save Changes</button>
        </form>
    </div>
</div>

<!-- MAIN SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const USER_ID = {{ request.session.api_user_id }};
    const API = "https://smart-commute-backend-production.up.railway.app";

    function formatTimeForInput(t) {
        if (!t) return "";
        return t.substring(11,16);
    }

    function formatTimeForDisplay(t) {
        if (!t) return "";
        const d = new Date(t);
        return d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
    }

    async function loadSchedules() {
        const res = await fetch(`${API}/schedules/${USER_ID}`);
        const data = await res.json();

        const table = document.getElementById("scheduleTable");
        table.innerHTML = `
            <tr>
                <th>Course</th>
                <th>Location</th>
                <th>Day(s)</th>
                <th>Start</th>
                <th>End</th>
                <th>Actions</th>
            </tr>
        `;

        data.forEach(s => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${s.course}</td>
                <td>${document.querySelector(`#building option[value='${s.building_id}']`)?.textContent || "N/A"}</td>
                <td>${s.days.join(", ")}</td>
                <td>${formatTimeForDisplay(s.start)}</td>
                <td>${formatTimeForDisplay(s.end)}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="openEditModal(${s.id}, '${s.course}', ${s.building_id}, '${s.days[0]}', '${formatTimeForInput(s.start)}', '${formatTimeForInput(s.end)}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteSchedule(${s.id})">Delete</button>
                    <a href="/route?building=${s.building_id}">
                        <button type="button" class="action-btn" style="background:#4a90e2; color:white;">Route</button>
                    </a>
                </td>
            `;
            table.appendChild(row);

            fillWeeklyGrid(s);
        });
    }

    function fillWeeklyGrid(s) {
    const dayMap = {
        "Monday": "Mon",
        "Tuesday": "Tue",
        "Wednesday": "Wed",
        "Thursday": "Thu",
        "Friday": "Fri"
    };

    const start = new Date(s.start.endsWith('Z') ? s.start : s.start + 'Z');
    const end = new Date(s.end.endsWith('Z') ? s.end : s.end + 'Z');

    let t = new Date(start);
    while (t <= end) {
        const hh = String(t.getUTCHours()).padStart(2, "0");
        const mm = String(t.getUTCMinutes()).padStart(2, "0");
        const idPart = `${hh}-${mm}`;

        s.days.forEach(d => {
            const cell = document.getElementById(`${dayMap[d]}-${idPart}`);
            if (cell) cell.style.background = "#cfe2ff";
        });

        t.setUTCMinutes(t.getUTCMinutes() + 15);
    }
}

    document.getElementById("scheduleForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const course = document.getElementById("course").value;
        const building = document.getElementById("building").value;
        const start = document.getElementById("start").value;
        const end = document.getElementById("end").value;

        const days = [...document.querySelectorAll("input[name='days']:checked")].map(d => d.value);

        if (!course || !building || !start || !end || days.length === 0) {
            alert("Please fill in all fields and select at least one day.");
            return;
        }

        const today = new Date().toISOString().split("T")[0];

        await fetch(`${API}/schedules/`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                course,
                days,
                start: `${today}T${start}:00Z`,
                end: `${today}T${end}:00Z`,
                user_id: USER_ID,
                building_id: Number(building)
            })
        });

        location.reload();
    });

    window.deleteSchedule = async function(id) {
        if (!confirm("Delete this class?")) return;

        await fetch(`${API}/schedules/${id}`, { method: "DELETE" });
        location.reload();
    }

    window.openEditModal = function(id, course, building, day, start, end) {
        document.getElementById("editCourse").value = course;
        document.getElementById("editBuilding").value = building;
        document.getElementById("editDay").value = day;
        document.getElementById("editStart").value = start;
        document.getElementById("editEnd").value = end;

        document.getElementById("editForm").setAttribute("data-id", id);
        document.getElementById("editModal").style.display = "flex";
    }

    window.closeModal = function() {
        document.getElementById("editModal").style.display = "none";
    }

    document.getElementById("editForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const id = e.target.getAttribute("data-id");

        const course = document.getElementById("editCourse").value;
        const building = document.getElementById("editBuilding").value;
        const day = document.getElementById("editDay").value;
        const start = document.getElementById("editStart").value;
        const end = document.getElementById("editEnd").value;

        const today = new Date().toISOString().split("T")[0];

        await fetch(`${API}/schedules/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                course,
                days: [day],
                start: `${today}T${start}:00Z`,
                end: `${today}T${end}:00Z`,
                building_id: Number(building)
            })
        });

        location.reload();
    });

    loadSchedules();

});
</script>

{% endblock %}
