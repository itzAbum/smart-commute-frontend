{% extends "home/base.html" %}

{% block content %}

<div style="
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
">
    <h2 style="color:#1e4d8a; text-align:center;">Route & Traffic</h2>

    <p style="text-align:center; margin-bottom:20px;">
        Showing route from your saved location to the selected building.
    </p>

    <!-- Google Maps Container -->
    <div id="map" style="width:100%; height:450px; border-radius:10px;"></div>
</div>

<script>
    function initMap() {
        const start = { lat: parseFloat("{{ start_lat }}"), lng: parseFloat("{{ start_lng }}") };
        const end = { lat: parseFloat("{{ end_lat }}"), lng: parseFloat("{{ end_lng }}") };

        const map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14,
            center: start
        });

        const directionsService = new google.maps.DirectionsService();
        const directionsRenderer = new google.maps.DirectionsRenderer();
        directionsRenderer.setMap(map);

        directionsService.route(
            {
                origin: start,
                destination: end,
                travelMode: google.maps.TravelMode.DRIVING
            },
            (result, status) => {
                if (status === "OK") {
                    directionsRenderer.setDirections(result);
                } else {
                    alert("Could not load route: " + status);
                }
            }
        );
    }
</script>

<!-- Load Google Maps API -->
<script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCPpUHaZ651VoNnSKa9uMwKaIWTd7EAhRc&callback=initMap">
</script>

{% endblock %}
